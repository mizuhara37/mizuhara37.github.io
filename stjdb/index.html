  <script type="text/javascript">
    function setStorage(cname,cvalue){
     localStorage.setItem(cname,cvalue);
}
   window.onload = function(){
    //获取4个按钮和两个输入框
    var stone = document.getElementById("stone");
    var cut = document.getElementById("cut");
    var cloth = document.getElementById("cloth");
    var mine = document.getElementById("mine");
    var guess = document.getElementById("guess");
    var computer = document.getElementById("computer");  
    //当点击按钮时,把按钮的value赋值给mine的value
    function click(){
     mine.value = this.value;
    }
    stone.onclick = click;
    cut.onclick = click;
    cloth.onclick = click;
    //生成一个随机数, 1代表石头, 2 代表剪刀 3布
    guess.onclick = function(){
     var num = Math.floor(Math.random()* 3 + 1);var coin =Number(localStorage.getItem("coin"));
     if(num == 1)
        computer.value = "石头";
     else if(num == 2)
         computer.value = "剪刀";
     else if(num == 3)
         computer.value = "布";
     var mineValue = mine.value;
     var computerValue = computer.value;
     var v;
     if(mineValue == computerValue)
        alert("平局");
      else if(mineValue == "石头")
        alert((computerValue == "剪刀" ? "赢了" : "输了")+'，电脑出的是'+computer.value);
      else if(mineValue == "剪刀")
        alert((computerValue == "布" ? "赢了" : "输了")+'，电脑出的是'+computer.value);
      else if(mineValue == "布")
        alert((computerValue == "石头" ? "赢了" : "输了")+'，电脑出的是'+computer.value);
       if(mineValue == computerValue)
        v="平局"
      else if(mineValue == "石头")
         v = (computerValue == "剪刀" ? "赢了" : "输了");
      else if(mineValue == "剪刀")
         v = (computerValue == "布" ? "赢了" : "输了");
      else if(mineValue == "布")
         v = (computerValue == "石头" ? "赢了" : "输了");
      if(v=="输了") coin=coin-25;
      else if(v=="赢了") coin=coin+50;
       setStorage("coin",coin);
      mine.value ="";
      computer.value ="";
    }
   }
  </script>

    <body>
     <input type="button" value="石头" id="stone">
  <input type="button" value="剪刀" id="cut">
  <input type="button" value="布" id="cloth"> <br><br>
  您出的拳是:<input id="mine"><br><br>
  <input type="button" value="猜猜猜" id="guess"><br><br><a id="computer"></a>
